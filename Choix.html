<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie des Bulletins de Note | Choix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header class="premium-header">
        <a id="homeButton" href="index.html" class="nav-link home no-print">
            <i class="fas fa-home"></i> Accueil
        </a>
        <a id="backButton" href="index.html" class="nav-link back no-print">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </header>

    <main class="main-container">
        <div class="glass-card animate-fade-in" style="max-width: 600px;">
            <h1 style="margin-bottom: 1rem;">Saisie des Bulletins</h1>
            <p style="margin-bottom: 2.5rem; color: #4b5563;">Veuillez sélectionner le niveau d'enseignement pour
                continuer la saisie des notes.</p>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <a href="classe.html" class="btn-premium"
                    style="background: var(--primary-color); padding: 30px 10px; border-radius: 12px; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    <i class="fas fa-school" style="font-size: 2.5rem; margin-bottom: 15px;"></i>
                    COLLEGE
                </a>
                <a href="serie.html" class="btn-premium"
                    style="background: var(--secondary-color); padding: 30px 10px; border-radius: 12px; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    <i class="fas fa-graduation-cap" style="font-size: 2.5rem; margin-bottom: 15px;"></i>
                    LYCEE
                </a>
            </div>
        </div>
    </main>
</body>

</html>
