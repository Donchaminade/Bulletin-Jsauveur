<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie des Bulletins de Note</title>
    <style>
        /* Applique le style pour le corps */
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            background-image: url('CS.png'); /* Remplacez par le lien de votre image */
            background-size: 50%; /* Taille de l'image de fond réduite à 50% */
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed; /* L'image reste en place au défilement */
        }

        /* Conteneur principal pour centrer le contenu */
        .container {
            text-align: center;
            background: rgba(10, 1, 129, 0.5); /* Ajoute un effet de transparence pour le texte */
            padding: 40px;
            border-radius: 8px;
        }

        /* Style du titre */
        h1 {
            font-size: 3em;
            font-weight: bold;
            margin: 0 0 20px;
        }

        /* Style du bouton */
        .start-button {
            display: inline-block;
            font-size: 1.2em;
            padding: 15px 30px;
            color: #ffffff;
            background-color: #850303; /* Couleur du bouton */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        /* Effet au survol du bouton */
        .start-button:hover {
            background-color: #101cc7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Saisie des Bulletins de Note</h1>
        <a href="Choix.html" class="start-button">Commencer</a>
        <br>
        <br>
        <p>Developper par CodeCrack</p>
        <p>Contact: +228 93 69 45 37 / 99 18 16 26 </p>
    </div>
</body>
</html>
