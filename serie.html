<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Saisie des Bulletins de Note | Lycée</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header class="premium-header">
        <a id="homeButton" href="index.html" class="nav-link home no-print">

        <a id="backButton" href="Choix.html" class="nav-link back no-print">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </header>

    <main class="main-container">
        <div class="glass-card animate-fade-in" style="max-width: 800px; margin-top: 80px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">CHOIX DE LA SÉRIE</h1>
            <p style="margin-bottom: 2rem; color: #4b5563;">Sélectionnez la série pour accéder au formulaire de saisie des notes.</p>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <!-- Seconde -->
                <a href="2nde A4.html" class="btn-premium" style="background: #dd089d; padding: 25px 10px; border-radius: 12px; font-size: 1rem; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    Seconde A4
                </a>
                <a href="2nde S.html" class="btn-premium" style="background: #dd089d; padding: 25px 10px; border-radius: 12px; font-size: 1rem; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    Seconde S
                </a>
                
                <!-- Première -->
                <a href="1ere A4.html" class="btn-premium" style="background: var(--primary-color); padding: 25px 10px; border-radius: 12px; font-size: 1rem; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    1ère A4
                </a>
                <a href="1er D.html" class="btn-premium" style="background: var(--primary-color); padding: 25px 10px; border-radius: 12px; font-size: 1rem; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    1ère D
                </a>
 
                <!-- Terminale -->
                <a href="T A4.html" class="btn-premium" style="background: var(--secondary-color); padding: 25px 10px; border-radius: 12px; font-size: 1rem; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    Terminale A4
                </a>
                <a href="T D.html" class="btn-premium" style="background: var(--secondary-color); padding: 25px 10px; border-radius: 12px; font-size: 1rem; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    Terminale D
                </a>
