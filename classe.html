<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie des Bulletins de Note</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Style de base */
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            background-image: url('CS.png'); /* Remplacez par le lien de votre image */
            background-size: 50%; /* Taille de l'image de fond réduite */
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
        }

        /* En-tête */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
        }

        /* Style des boutons de l'en-tête */
        header .button {
            display: inline-flex;
            align-items: center;
            padding: 10px 15px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            color: #fff;
            text-decoration: none;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        header .button i {
            margin-right: 8px;
        }

        header .button:hover {
            transform: scale(1.05);
        }

        #homeButton {
            background-color: #28a745;
        }
        #homeButton:hover {
            background-color: #1e7e34;
        }

        #backButton {
            background-color: #ffc107;
            color: #212529;
        }
        #backButton:hover {
            background-color: #e0a800;
        }

        /* Cache les boutons lors de l'impression */
        @media print {
            .no-print {
                display: none !important;
            }
        }

        /* Conteneur principal */
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6); /* Effet de transparence */
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin-top: 100px; /* Pour éviter que le contenu ne chevauche l'en-tête */
        }

        /* Style du titre */
        h1 {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Conteneur des boutons */
        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        /* Style des boutons */
        .button {
            font-size: 1.2em;
            padding: 15px 30px;
            color: #fff;
            background-color: #ebad02;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 120px;
        }

        .button:hover {
            background-color: #02852e;
        }
    </style>
</head>
<body>
    <!-- En-tête fixe avec les boutons -->
    <header>
        <a id="homeButton" href="index.html" class="button no-print">
            <i class="fas fa-home"></i> Home
        </a>
        <a id="backButton" href="Choix.html" class="button no-print">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </header>

    <!-- Conteneur principal -->
    <div class="container">
        <h1>CHOIX DE LA CLASSE</h1>
        <div class="button-container">
            <a href="6-5ème.html" class="button">Classe de 6em / 5em</a>
            <a href="4-3ème.html" class="button">Classe de 4em / 3em</a>
        </div>
    </div>
</body>
</html>
