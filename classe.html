<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie des Bulletins de Note | Collège</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="premium-header">
        <a id="homeButton" href="index.html" class="nav-link home no-print">
            <i class="fas fa-home"></i> Accueil
        </a>
        <a id="backButton" href="Choix.html" class="nav-link back no-print">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </header>

    <main class="main-container">
        <div class="glass-card animate-fade-in" style="max-width: 700px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">CHOIX DE LA CLASSE</h1>
            <p style="margin-bottom: 2.5rem; color: #4b5563;">Sélectionnez le groupe de classes pour lequel vous souhaitez saisir les notes.</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <a href="6-5ème.html" class="btn-premium" style="background: var(--primary-color); padding: 40px 15px; border-radius: 12px; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    <i class="fas fa-users" style="font-size: 2.5rem; margin-bottom: 15px;"></i>
                    6ème / 5ème
                </a>
                <a href="4-3ème.html" class="btn-premium" style="background: var(--primary-color); padding: 40px 15px; border-radius: 12px; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: var(--transition); border: none; font-weight: 700;">
                    <i class="fas fa-users" style="font-size: 2.5rem; margin-bottom: 15px;"></i>
                    4ème / 3ème
                </a>
            </div>
        </div>
    </main>
</body>
</html>
